<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #F8FAFC;
    }
    h2 {
      font-size: 18px;
      margin: 0 0 15px;
      color: #F8FAFC;
    }
    p {
      font-size: 13px;
      color: #94A3B8;
      margin: 0 0 15px;
      line-height: 1.4;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #1E293B;
      color: #F8FAFC;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: none;
      background: #6366F1;
      color: #F8FAFC;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #4F46E5;
    }
    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
    .status.success {
      background: rgba(34, 197, 94, 0.2);
      color: #22C55E;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.2);
      color: #EF4444;
    }
  </style>
</head>
<body>
  <h2>🪦 Dead Yet</h2>
  <p>Enter the same webhook URL from your Dead Yet app. When triggered, this extension will clear your browser history.</p>
  <input type="text" id="webhookUrl" placeholder="https://your-webhook.com/clear" />
  <button id="saveBtn">Save Webhook URL</button>
  <div id="status" class="status" style="display: none;"></div>
  <script src="popup.js"></script>
</body>
</html>
